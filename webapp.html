<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Web</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
:root {
  --green:#075E54; --light:#25D366; --teal:#128C7E;
  --dark:#111b21; --darker:#0b141a; --hover:#202c33;
  --border:#2a3942; --input:#2a3942; --txt:#e9edef; --muted:#8696a0;
  --out:#005c4b; --inn:#202c33;
  --ff:'Syne',sans-serif; --fb:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fb);background:var(--darker);color:var(--txt);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
#login{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at 30% 50%,#075e5422 0%,transparent 60%),var(--darker);}
.box{background:var(--dark);border:1px solid var(--border);border-radius:24px;padding:48px 52px;width:420px;text-align:center;box-shadow:0 32px 80px #0006;}
.logo{width:68px;height:68px;background:linear-gradient(135deg,var(--green),var(--teal));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:30px;}
.title{font-family:var(--ff);font-size:30px;font-weight:800;margin-bottom:4px;}
.sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
.step{display:none;}.step.on{display:block;}
.lbl{display:block;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;text-align:left;}
input[type=text],input[type=tel],input[type=number]{width:100%;background:var(--input);border:1px solid var(--border);border-radius:12px;padding:13px 15px;color:var(--txt);font-family:var(--fb);font-size:15px;outline:none;transition:border .2s;}
input:focus{border-color:var(--light);}
input::placeholder{color:var(--muted);}
.ig{margin-bottom:14px;}
.btn{width:100%;background:var(--light);color:#fff;border:none;border-radius:12px;padding:13px;font-family:var(--ff);font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .2s;}
.btn:hover{opacity:.9;}.btn:disabled{opacity:.4;cursor:not-allowed;}
.note{font-size:12px;color:var(--muted);margin-top:14px;}
.otp-row{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.otp-row input{width:48px;height:52px;font-size:22px;font-weight:700;text-align:center;border-radius:10px;padding:0;}
#err{color:#ff6b6b;font-size:13px;margin-top:10px;min-height:18px;}
#app{display:none;height:100vh;flex-direction:column;}
#app.on{display:flex;}
.topbar{background:var(--green);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;}
.topbar-l{display:flex;align-items:center;gap:10px;}
.app-title{font-family:var(--ff);font-size:22px;font-weight:800;color:#fff;}
.badge{font-size:11px;background:var(--light);color:#fff;padding:2px 8px;border-radius:6px;font-weight:600;}
.topbar-r{display:flex;align-items:center;gap:6px;}
.ibtn{background:rgba(255,255,255,.12);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px;transition:background .2s;}
.ibtn:hover{background:rgba(255,255,255,.22);}
.av{width:32px;height:32px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer;overflow:hidden;flex-shrink:0;}
.av img{width:100%;height:100%;object-fit:cover;}
.body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:360px;min-width:300px;background:var(--dark);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:13px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:var(--ff);}
.tab.on{color:var(--light);border-bottom-color:var(--light);}
.tab:hover{color:var(--txt);}
.srch{padding:9px 11px;border-bottom:1px solid var(--border);}
.srch input{background:var(--input);border:none;border-radius:8px;padding:9px 13px;width:100%;color:var(--txt);font-size:14px;outline:none;font-family:var(--fb);}
.clist{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.ci{display:flex;align-items:center;padding:10px 15px;gap:11px;cursor:pointer;border-bottom:1px solid #ffffff05;transition:background .15s;}
.ci:hover,.ci.on{background:var(--hover);}
.ca{width:46px;height:46px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;overflow:hidden;}
.ca img{width:100%;height:100%;object-fit:cover;}
.cinfo{flex:1;min-width:0;}
.cname{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.clast{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.cmeta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ctime{font-size:11px;color:var(--muted);}
.add-btn{margin:10px;background:var(--light);color:#fff;border:none;border-radius:10px;padding:10px;font-family:var(--ff);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.add-btn:hover{opacity:.9;}
.chat{flex:1;display:flex;flex-direction:column;background:var(--darker);overflow:hidden;}
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:14px;}
.nci{width:76px;height:76px;background:var(--hover);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;opacity:.5;}
.chat-hdr{background:var(--dark);padding:9px 18px;display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--border);flex-shrink:0;}
.ch-info{flex:1;}
.ch-name{font-family:var(--ff);font-size:16px;font-weight:700;}
.ch-sub{font-size:12px;color:var(--light);margin-top:1px;}
.msgs{flex:1;overflow-y:auto;padding:14px 8%;display:flex;flex-direction:column;gap:2px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.dsep{text-align:center;margin:10px 0;}
.dsep span{background:var(--dark);color:var(--muted);font-size:11px;font-weight:500;padding:4px 12px;border-radius:8px;border:1px solid var(--border);}
.mrow{display:flex;}
.mrow.out{justify-content:flex-end;}.mrow.inn{justify-content:flex-start;}
.bubble{max-width:65%;padding:7px 11px 5px;border-radius:10px;word-wrap:break-word;}
.out .bubble{background:var(--out);border-bottom-right-radius:3px;}
.inn .bubble{background:var(--inn);border-bottom-left-radius:3px;}
.btxt{font-size:14.5px;line-height:1.5;}
.bmeta{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:3px;}
.btime{font-size:11px;color:var(--muted);}
.btick{font-size:12px;color:var(--muted);}
.btick.read{color:#53bdeb;}
.ibar{background:var(--dark);padding:9px 14px;display:flex;align-items:center;gap:11px;border-top:1px solid var(--border);flex-shrink:0;}
.ibar input{flex:1;background:var(--input);border:none;border-radius:10px;padding:11px 16px;color:var(--txt);font-family:var(--fb);font-size:15px;outline:none;}
.ibar input::placeholder{color:var(--muted);}
.send{width:42px;height:42px;background:var(--light);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .2s,transform .1s;flex-shrink:0;}
.send:hover{background:#20c55a;}.send:active{transform:scale(.92);}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;padding:16px;}
.scard{background:var(--hover);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s;aspect-ratio:9/16;position:relative;display:flex;align-items:center;justify-content:center;}
.scard:hover{transform:scale(1.03);}.scard img{width:100%;height:100%;object-fit:cover;}
.sovl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:10px 8px 7px;}
.sname{font-size:12px;font-weight:600;color:#fff;}.stime{font-size:10px;color:rgba(255,255,255,.7);}
.overlay{display:none;position:fixed;inset:0;background:#0007;z-index:100;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:var(--dark);border:1px solid var(--border);border-radius:20px;padding:30px;width:380px;box-shadow:0 24px 60px #0005;}
.modal-title{font-family:var(--ff);font-size:19px;font-weight:700;margin-bottom:18px;}
.modal-btns{display:flex;gap:10px;margin-top:14px;}
.btn2{flex:1;background:var(--input);color:var(--txt);border:none;border-radius:10px;padding:11px;font-size:14px;cursor:pointer;transition:background .2s;}
.btn2:hover{background:var(--border);}
.res{background:var(--input);border-radius:10px;padding:11px;display:flex;align-items:center;gap:10px;margin-top:10px;}
.rinfo{flex:1;}.rname{font-weight:600;font-size:15px;}.rphone{font-size:12px;color:var(--muted);}.rbadge{font-size:11px;color:var(--light);}
.merr{color:#ff6b6b;font-size:13px;margin-top:8px;}
.empty{padding:40px;text-align:center;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:12px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mrow{animation:fadeUp .15s ease;}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div class="logo">💬</div>
    <div class="title">Nova Web</div>
    <div class="sub">Sign in with your phone number</div>
    <div class="step on" id="step-phone">
      <div class="ig"><label class="lbl">Phone Number</label>
        <input type="tel" id="phone-input" placeholder="+91 XXXXX XXXXX">
      </div>
      <div id="recaptcha-container"></div>
      <button class="btn" id="send-otp-btn">Send OTP</button>
      <div class="note">We'll send a 6-digit code to your number</div>
    </div>
    <div class="step" id="step-otp">
      <div class="sub" id="otp-lbl" style="margin-bottom:18px">Enter the code sent to your number</div>
      <div class="otp-row">
        <input type="number" class="od" max="9" min="0">
        <input type="number" class="od" max="9" min="0">
        <input type="number" class="od" max="9" min="0">
        <input type="number" class="od" max="9" min="0">
        <input type="number" class="od" max="9" min="0">
        <input type="number" class="od" max="9" min="0">
      </div>
      <button class="btn" id="verify-btn">Verify & Sign In</button>
    </div>
    <div class="step" id="step-profile">
      <div class="ig"><label class="lbl">Your Name</label>
        <input type="text" id="name-input" placeholder="e.g. Sreeman Siddi">
      </div>
      <button class="btn" id="save-profile-btn">Continue →</button>
    </div>
    <div id="err"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-l">
      <div class="app-title">Nova</div>
      <div class="badge">☁️ Online</div>
    </div>
    <div class="topbar-r">
      <button class="ibtn" id="btn-add">➕</button>
      <button class="ibtn" id="btn-logout">🚪</button>
      <div class="av" id="hdr-av">S</div>
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="tabs">
        <div class="tab on" data-tab="chats">Chats</div>
        <div class="tab" data-tab="calls">Calls</div>
        <div class="tab" data-tab="status">Status</div>
      </div>
      <div id="pane-chats" style="display:flex;flex-direction:column;flex:1;">
        <div class="srch"><input type="text" id="srch-inp" placeholder="🔍  Search contacts"></div>
        <div class="clist" id="clist"></div>
        <button class="add-btn" id="btn-add2">+ Add Contact</button>
      </div>
      <div id="pane-calls" style="display:none;flex:1;overflow-y:auto;">
        <div class="empty"><div style="font-size:38px">📞</div><div>No recent calls</div></div>
      </div>
      <div id="pane-status" style="display:none;flex:1;overflow-y:auto;">
        <div class="sgrid" id="sgrid"><div class="empty" style="grid-column:1/-1">No status updates</div></div>
      </div>
    </div>
    <div class="chat">
      <div class="no-chat" id="no-chat">
        <div class="nci">💬</div>
        <div style="font-family:var(--ff);font-size:19px;font-weight:600;opacity:.4">Select a chat</div>
        <div style="font-size:13px">Nova Web — synced with your phone in real time</div>
      </div>
      <div id="active-chat" style="display:none;flex-direction:column;height:100%;">
        <div class="chat-hdr">
          <div class="ca" id="chat-av">S</div>
          <div class="ch-info">
            <div class="ch-name" id="chat-name">Contact</div>
            <div class="ch-sub" id="chat-sub"></div>
          </div>
          <button class="ibtn" id="close-chat">✕</button>
        </div>
        <div class="msgs" id="msgs"></div>
        <div class="ibar">
          <input type="text" id="msg-inp" placeholder="Type a message…">
          <button class="send" id="send-btn">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">Add Contact</div>
    <div class="ig"><label class="lbl">Phone Number</label>
      <input type="tel" id="m-phone" placeholder="+91XXXXXXXXXX">
    </div>
    <button class="btn" id="m-search">Search</button>
    <div id="m-result" style="display:none" class="res">
      <div class="ca" id="m-av">?</div>
      <div class="rinfo">
        <div class="rname" id="m-name"></div>
        <div class="rphone" id="m-ph"></div>
        <div class="rbadge">Nova user ✅</div>
      </div>
    </div>
    <div id="m-err" class="merr"></div>
    <div class="modal-btns">
      <button class="btn2" id="m-cancel">Cancel</button>
      <button class="btn" id="m-add" style="display:none">Add Contact</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG — replace with your Firebase values ────────────
var firebaseConfig = {
  apiKey:            "AIzaSyD616Ml1Cko8U_w-rxGNslic_z1eDbW4bk",
  authDomain:        "nova-e7131.firebaseapp.com",
  databaseURL:       "https://nova-e7131-default-rtdb.firebaseio.com",
  projectId:         "nova-e7131",
  storageBucket:     "nova-e7131.firebasestorage.app",
  messagingSenderId: "1090101685130",
  appId:             "1:1090101685130:web:22c0bb2004da6680797673"
}
firebase.initializeApp(firebaseConfig)
var auth = firebase.auth()
var db   = firebase.database()

// ── STATE ─────────────────────────────────────────────────
var uid      = null
var profile  = null
var contacts = JSON.parse(localStorage.getItem('nova_contacts') || '[]')
var active   = null
var confirm_ = null
var found    = null

// ── AUTH STATE ────────────────────────────────────────────
auth.onAuthStateChanged(function(user) {
  if (user) {
    uid = user.uid
    db.ref('users/'+uid).get().then(function(s) {
      if (s.exists() && s.val().name) { profile = s.val(); showApp() }
      else showStep('profile')
    })
  } else showStep('phone')
})

// ── STEPS ─────────────────────────────────────────────────
function showStep(s) {
  document.querySelectorAll('.step').forEach(function(el){el.classList.remove('on')})
  document.getElementById('step-'+s).classList.add('on')
  document.getElementById('login').style.display = 'flex'
  document.getElementById('app').classList.remove('on')
}

function showApp() {
  document.getElementById('login').style.display = 'none'
  document.getElementById('app').classList.add('on')
  var av = document.getElementById('hdr-av')
  av.innerHTML = profile.avatarBase64
    ? '<img src="data:image/jpeg;base64,'+profile.avatarBase64+'">'
    : profile.name.charAt(0).toUpperCase()
  loadContacts()
  listenStatus()
}

// ── SEND OTP ──────────────────────────────────────────────
document.getElementById('send-otp-btn').onclick = function() {
  var phone = document.getElementById('phone-input').value.trim()
  if (!phone) return
  var btn = this; btn.disabled = true; btn.textContent = 'Sending...'
  document.getElementById('err').textContent = ''
  if (!window._rcv) {
    window._rcv = new firebase.auth.RecaptchaVerifier('recaptcha-container', {size:'invisible'})
  }
  auth.signInWithPhoneNumber(phone, window._rcv)
    .then(function(r) {
      confirm_ = r
      document.getElementById('otp-lbl').textContent = 'Code sent to '+phone
      showStep('otp')
    })
    .catch(function(e) {
      document.getElementById('err').textContent = '❌ '+e.message
      btn.disabled = false; btn.textContent = 'Send OTP'
    })
}

// ── OTP INPUT ─────────────────────────────────────────────
document.querySelectorAll('.od').forEach(function(el, i) {
  el.addEventListener('input', function() {
    this.value = this.value.slice(-1)
    var all = document.querySelectorAll('.od')
    if (this.value && i < 5) all[i+1].focus()
  })
  el.addEventListener('keydown', function(e) {
    if (e.key==='Backspace' && !this.value && i>0)
      document.querySelectorAll('.od')[i-1].focus()
  })
})

// ── VERIFY OTP ────────────────────────────────────────────
document.getElementById('verify-btn').onclick = function() {
  var code = Array.from(document.querySelectorAll('.od')).map(function(d){return d.value}).join('')
  if (code.length!==6) return
  var btn = this; btn.disabled=true; btn.textContent='Verifying...'
  confirm_.confirm(code).catch(function(e) {
    document.getElementById('err').textContent = '❌ Wrong OTP'
    btn.disabled=false; btn.textContent='Verify & Sign In'
  })
}

// ── SAVE PROFILE ──────────────────────────────────────────
document.getElementById('save-profile-btn').onclick = function() {
  var name = document.getElementById('name-input').value.trim()
  if (!name) return
  var phone = (auth.currentUser && auth.currentUser.phoneNumber) || ''
  var p = {uid:uid, name:name, phoneNumber:phone, avatarBase64:''}
  db.ref('users/'+uid).set(p).then(function() {
    return db.ref('phoneIndex/'+phone.replace(/\D/g,'')).set(uid)
  }).then(function() { profile=p; showApp() })
}

// ── LOGOUT ────────────────────────────────────────────────
document.getElementById('btn-logout').onclick = function() { auth.signOut() }

// ── TABS ──────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.onclick = function() {
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')})
    this.classList.add('on')
    var t = this.dataset.tab
    document.getElementById('pane-chats').style.display  = t==='chats' ? 'flex' : 'none'
    document.getElementById('pane-calls').style.display  = t==='calls' ? 'flex' : 'none'
    document.getElementById('pane-status').style.display = t==='status'? 'flex' : 'none'
    if (t==='chats') document.getElementById('pane-chats').style.flexDirection='column'
  }
})

// ── CONTACTS ──────────────────────────────────────────────
function loadContacts() {
  if (!contacts.length) {
    document.getElementById('clist').innerHTML =
      '<div class="empty"><div style="font-size:38px">💬</div><div>No contacts yet. Tap + to add.</div></div>'
    return
  }
  renderContacts(contacts)
  contacts.forEach(listenLastMsg)
}

function renderContacts(list) {
  var el = document.getElementById('clist')
  el.innerHTML = ''
  list.forEach(function(c) {
    var d = document.createElement('div')
    d.className = 'ci'+(active&&active.uid===c.uid?' on':'')
    d.id = 'ci-'+c.uid
    d.onclick = function(){openChat(c)}
    d.innerHTML =
      '<div class="ca">'+(c.avatarBase64?'<img src="data:image/jpeg;base64,'+c.avatarBase64+'">':c.name.charAt(0).toUpperCase())+'</div>'+
      '<div class="cinfo"><div class="cname">'+c.name+'</div><div class="clast" id="last-'+c.uid+'">Tap to chat</div></div>'+
      '<div class="cmeta"><div class="ctime" id="time-'+c.uid+'"></div></div>'
    el.appendChild(d)
  })
}

function listenLastMsg(c) {
  db.ref('chats/'+[uid,c.uid].sort().join('_')).orderByChild('timestamp').on('value', function(s) {
    if (!s.exists()) return
    var msgs=[]; s.forEach(function(x){msgs.push(x.val())})
    var last = msgs[msgs.length-1]
    var le=document.getElementById('last-'+c.uid), te=document.getElementById('time-'+c.uid)
    if(le) le.textContent = last.message||'Photo'
    if(te) te.textContent = ft(last.timestamp)
    if(active&&active.uid===c.uid) renderMsgs(msgs)
  })
}

document.getElementById('srch-inp').oninput = function() {
  var q=this.value.toLowerCase()
  renderContacts(contacts.filter(function(c){return c.name.toLowerCase().includes(q)||c.phoneNumber.includes(q)}))
}

// ── CHAT ──────────────────────────────────────────────────
function openChat(c) {
  active = c
  document.getElementById('no-chat').style.display='none'
  document.getElementById('active-chat').style.display='flex'
  var av=document.getElementById('chat-av')
  av.innerHTML = c.avatarBase64?'<img src="data:image/jpeg;base64,'+c.avatarBase64+'">':c.name.charAt(0).toUpperCase()
  document.getElementById('chat-name').textContent = c.name
  document.getElementById('chat-sub').textContent  = c.phoneNumber
  document.querySelectorAll('.ci').forEach(function(el){el.classList.remove('on')})
  var el=document.getElementById('ci-'+c.uid); if(el) el.classList.add('on')
  db.ref('chats/'+[uid,c.uid].sort().join('_')).orderByChild('timestamp').on('value', function(s) {
    var msgs=[]; if(s.exists()) s.forEach(function(x){msgs.push(x.val())})
    renderMsgs(msgs)
  })
  document.getElementById('msg-inp').focus()
}

document.getElementById('close-chat').onclick = function() {
  active=null
  document.getElementById('no-chat').style.display='flex'
  document.getElementById('active-chat').style.display='none'
  document.querySelectorAll('.ci').forEach(function(el){el.classList.remove('on')})
}

function renderMsgs(msgs) {
  var el=document.getElementById('msgs'); el.innerHTML=''
  var lastD=''
  msgs.sort(function(a,b){return a.timestamp-b.timestamp}).forEach(function(m) {
    var d=fd(m.timestamp)
    if(d!==lastD){lastD=d;var sep=document.createElement('div');sep.className='dsep';sep.innerHTML='<span>'+d+'</span>';el.appendChild(sep)}
    var mine=m.senderId===uid
    var row=document.createElement('div'); row.className='mrow '+(mine?'out':'inn')
    row.innerHTML='<div class="bubble"><div class="btxt">'+esc(m.message||'')+'</div><div class="bmeta"><span class="btime">'+ft(m.timestamp)+'</span>'+(mine?'<span class="btick'+(m.read?' read':'')+'">✓✓</span>':'')+'</div></div>'
    el.appendChild(row)
  })
  el.scrollTop=el.scrollHeight
}

function sendMsg() {
  var inp=document.getElementById('msg-inp'), text=inp.value.trim()
  if(!text||!active) return
  inp.value=''
  var now=Date.now()
  db.ref('chats/'+[uid,active.uid].sort().join('_')).push({
    senderId:uid, receiverId:active.uid, message:text,
    timestamp:now, dateStr:fd(now), timeStr:ft(now),
    transport:'firebase', read:false, deleted:false, type:'text'
  })
}
document.getElementById('send-btn').onclick = sendMsg
document.getElementById('msg-inp').onkeydown = function(e){if(e.key==='Enter')sendMsg()}

// ── ADD CONTACT ───────────────────────────────────────────
function openModal(){
  document.getElementById('add-modal').classList.add('on')
  document.getElementById('m-phone').value=''
  document.getElementById('m-result').style.display='none'
  document.getElementById('m-err').textContent=''
  document.getElementById('m-add').style.display='none'
  found=null
}
document.getElementById('btn-add').onclick  = openModal
document.getElementById('btn-add2').onclick = openModal
document.getElementById('m-cancel').onclick = function(){document.getElementById('add-modal').classList.remove('on')}

document.getElementById('m-search').onclick = function() {
  var phone=document.getElementById('m-phone').value.trim()
  var clean=phone.replace(/\D/g,'')
  var btn=this; btn.textContent='Searching...'
  document.getElementById('m-err').textContent=''
  document.getElementById('m-result').style.display='none'
  document.getElementById('m-add').style.display='none'
  db.ref('phoneIndex/'+clean).get().then(function(s) {
    if(!s.exists()){document.getElementById('m-err').textContent='❌ No Nova user with this number';btn.textContent='Search';return}
    return db.ref('users/'+s.val()).get().then(function(u) {
      btn.textContent='Search'
      if(u.exists()){
        found=u.val()
        document.getElementById('m-name').textContent=found.name
        document.getElementById('m-ph').textContent=found.phoneNumber
        var av=document.getElementById('m-av')
        av.innerHTML=found.avatarBase64?'<img src="data:image/jpeg;base64,'+found.avatarBase64+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">':found.name.charAt(0).toUpperCase()
        document.getElementById('m-result').style.display='flex'
        document.getElementById('m-add').style.display='block'
      }
    })
  }).catch(function(){document.getElementById('m-err').textContent='❌ Search failed';btn.textContent='Search'})
}

document.getElementById('m-add').onclick = function() {
  if(!found) return
  if(!contacts.find(function(c){return c.uid===found.uid})){
    contacts.push(found)
    localStorage.setItem('nova_contacts',JSON.stringify(contacts))
  }
  document.getElementById('add-modal').classList.remove('on')
  loadContacts()
  openChat(found)
}

// ── STATUS ────────────────────────────────────────────────
function listenStatus() {
  db.ref('statuses').on('value', function(snap) {
    var grid=document.getElementById('sgrid'), now=Date.now(), count=0
    grid.innerHTML=''
    if(!snap.exists()){grid.innerHTML='<div class="empty" style="grid-column:1/-1">No status updates</div>';return}
    snap.forEach(function(u){u.forEach(function(ss){
      var s=ss.val()
      if(s.expiresAt>now){
        count++
        var card=document.createElement('div'); card.className='scard'
        var mins=Math.floor((now-s.timestamp)/60000), t=mins<60?mins+'m ago':Math.floor(mins/60)+'h ago'
        card.innerHTML='<img src="data:image/jpeg;base64,'+s.imageBase64+'" onerror="this.style.display=\'none\'"><div class="sovl"><div class="sname">'+s.userName+'</div><div class="stime">'+t+'</div></div>'
        grid.appendChild(card)
      }
    })})
    if(!count) grid.innerHTML='<div class="empty" style="grid-column:1/-1">No status updates</div>'
  })
}

// ── HELPERS ───────────────────────────────────────────────
function ft(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false})}
function fd(ts){
  var d=new Date(ts),n=new Date()
  if(d.toDateString()===n.toDateString()) return 'Today'
  var y=new Date(n); y.setDate(y.getDate()-1)
  if(d.toDateString()===y.toDateString()) return 'Yesterday'
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
